<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyMusic">
  <meta name="description" content="MyMusic Player">
  <title>MyMusic</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- Stylesheets — load order matters -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/desktop.css" media="(hover: hover) and (pointer: fine)">
  <link rel="stylesheet" href="/css/ios.css" media="(hover: none)">
</head>
<body>

  <!-- ═══════════════════════════════════════════ -->
  <!--   DESKTOP LAYOUT (Windows / macOS / Linux)  -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="app-desktop" class="platform-desktop hidden">

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <svg class="logo" width="32" height="32" viewBox="0 0 32 32">
          <circle cx="16" cy="16" r="14" fill="#1db954"/>
          <path d="M13 10v12l11-6z" fill="#0a0a0a"/>
        </svg>
        <span class="app-name" data-i18n="appName">MyMusic</span>
      </div>
      <div class="top-bar-center">
        <div class="search-box">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search-desktop" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="搜索歌曲、艺术家...">
          <kbd class="search-shortcut" id="search-shortcut">⌘K</kbd>
        </div>
      </div>
      <div class="top-bar-right">
        <button class="btn-icon btn-shortcuts" id="btn-shortcuts" title="快捷键 (?)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h8M6 16h.01M18 16h.01M10 12h4"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-filter="all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
            <span data-i18n="navAll">全部歌曲</span>
          </a>
          <a href="#" class="nav-item" data-filter="favorites">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span data-i18n="navFavorites">我的收藏</span>
          </a>
          <div class="nav-divider"></div>
          <div class="sidebar-section-title" data-i18n="sidebarLibrary">音乐库</div>
        </nav>
      </aside>

      <!-- Playlist Panel -->
      <section class="playlist-panel">
        <div class="playlist-header">
          <h2 class="playlist-title" id="playlist-title" data-i18n="allSongs">全部歌曲</h2>
          <span class="song-count" id="song-count">0 首</span>
        </div>
        <div class="playlist-header-row">
          <span class="col-index">#</span>
          <span class="col-title" data-i18n="colTitle">标题</span>
          <span class="col-album" data-i18n="colAlbum">专辑</span>
          <span class="col-duration" data-i18n="colDuration">时长</span>
          <span class="col-actions"></span>
        </div>
        <div class="playlist" id="playlist-desktop"></div>
        <div class="playlist-empty" id="playlist-empty-desktop">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          <p data-i18n="loadingSongs">正在加载歌曲...</p>
        </div>
      </section>

      <!-- Now Playing Panel -->
      <section class="now-playing-panel">
        <div class="now-playing-content" id="now-playing-content">
          <div class="np-placeholder" id="np-placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1">
              <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
            <p data-i18n="selectSong">选择一首歌开始播放</p>
          </div>
          <div class="np-active hidden" id="np-active">
            <div class="np-cover-container">
              <canvas id="visualizer-desktop" class="visualizer-canvas hidden"></canvas>
              <img id="np-cover" class="np-cover" src="" alt="Album Cover">
              <div class="np-cover-overlay"></div>
            </div>
            <div class="np-info">
              <h2 class="np-title" id="np-title"></h2>
              <p class="np-artist" id="np-artist"></p>
            </div>
            <div class="np-progress-container">
              <span class="np-time-current" id="np-time-current">0:00</span>
              <div class="np-progress-bar" id="np-progress-bar">
                <div class="np-progress-fill" id="np-progress-fill"></div>
                <div class="np-progress-handle" id="np-progress-handle"></div>
              </div>
              <span class="np-time-total" id="np-time-total">0:00</span>
            </div>
            <div class="np-controls">
              <button class="btn-control" id="btn-shuffle" title="随机播放">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
                  <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
                  <line x1="4" y1="4" x2="9" y2="9"/>
                </svg>
              </button>
              <button class="btn-control btn-control-lg" id="btn-prev-desktop" title="上一首">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
              </button>
              <button class="btn-control btn-play" id="btn-play-desktop" title="播放">
                <svg class="icon-play" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8 5v14l11-7z"/>
                </svg>
                <svg class="icon-pause hidden" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
                </svg>
              </button>
              <button class="btn-control btn-control-lg" id="btn-next-desktop" title="下一首">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
              </button>
              <button class="btn-control" id="btn-repeat" title="循环模式">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                  <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                </svg>
              </button>
            </div>
            <div class="np-extra-controls">
              <button class="btn-control btn-fav" id="btn-fav-desktop" title="收藏">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
              </button>
              <div class="volume-control">
                <button class="btn-control" id="btn-volume-desktop" title="音量">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                  </svg>
                </button>
                <div class="volume-slider-container">
                  <input type="range" class="volume-slider" id="volume-slider-desktop" min="0" max="100" value="80">
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Player Bar -->
    <footer class="player-bar">
      <div class="player-bar-info">
        <div class="player-bar-cover">
          <img id="bar-cover" src="" alt="">
        </div>
        <div class="player-bar-text">
          <div class="player-bar-title" id="bar-title"></div>
          <div class="player-bar-artist" id="bar-artist"></div>
        </div>
        <button class="btn-icon btn-bar-fav" id="btn-fav-bar" title="收藏">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>
      <div class="player-bar-center">
        <div class="player-bar-controls">
          <button class="btn-icon" id="btn-prev-bar" title="上一首">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
            </svg>
          </button>
          <button class="btn-icon btn-play-bar" id="btn-play-bar" title="播放/暂停">
            <svg class="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="icon-pause hidden" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
            </svg>
          </button>
          <button class="btn-icon" id="btn-next-bar" title="下一首">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
        </div>
        <div class="player-bar-progress">
          <span class="time-current" id="bar-time-current">0:00</span>
          <div class="progress-bar" id="bar-progress-bar">
            <div class="progress-fill" id="bar-progress-fill"></div>
            <div class="progress-handle" id="bar-progress-handle"></div>
          </div>
          <span class="time-total" id="bar-time-total">0:00</span>
        </div>
      </div>
      <div class="player-bar-right">
        <button class="btn-icon" id="btn-queue" title="播放队列">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
        <div class="volume-control">
          <button class="btn-icon" id="btn-volume-bar" title="音量">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <div class="volume-slider-container">
            <input type="range" class="volume-slider" id="volume-slider-bar" min="0" max="100" value="80">
          </div>
        </div>
      </div>
    </footer>

    <!-- Keyboard Shortcuts Modal -->
    <div class="modal hidden" id="shortcuts-modal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 data-i18n="shortcutsTitle">键盘快捷键</h3>
          <button class="btn-icon btn-close-modal" id="btn-close-shortcuts">✕</button>
        </div>
        <div class="modal-body">
          <div class="shortcut-group">
            <h4 data-i18n="shortcutsPlayback">播放控制</h4>
            <div class="shortcut-row"><kbd>Space</kbd><span data-i18n="scTogglePlay">播放/暂停</span></div>
            <div class="shortcut-row"><kbd>←</kbd><span data-i18n="scSeekBack">快退 5 秒</span></div>
            <div class="shortcut-row"><kbd>→</kbd><span data-i18n="scSeekForward">快进 5 秒</span></div>
            <div class="shortcut-row"><kbd>↑</kbd><span data-i18n="scVolumeUp">音量 +</span></div>
            <div class="shortcut-row"><kbd>↓</kbd><span data-i18n="scVolumeDown">音量 -</span></div>
            <div class="shortcut-row"><kbd>M</kbd><span data-i18n="scMute">静音切换</span></div>
            <div class="shortcut-row"><kbd>Ctrl</kbd>+<kbd>←</kbd><span data-i18n="scPrev">上一首</span></div>
            <div class="shortcut-row"><kbd>Ctrl</kbd>+<kbd>→</kbd><span data-i18n="scNext">下一首</span></div>
          </div>
          <div class="shortcut-group">
            <h4 data-i18n="shortcutsNav">导航</h4>
            <div class="shortcut-row"><kbd>Ctrl</kbd>+<kbd>K</kbd><span data-i18n="scSearch">聚焦搜索</span></div>
            <div class="shortcut-row"><kbd>F</kbd><span data-i18n="scFullscreen">全屏播放器</span></div>
            <div class="shortcut-row"><kbd>Esc</kbd><span data-i18n="scClose">关闭弹窗/全屏</span></div>
            <div class="shortcut-row"><kbd>1</kbd>-<kbd>9</kbd><span data-i18n="scJump">跳转到第 N 首</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Queue Modal -->
    <div class="modal hidden" id="queue-modal">
      <div class="modal-backdrop" id="queue-backdrop"></div>
      <div class="modal-content modal-right">
        <div class="modal-header">
          <h3 data-i18n="queueTitle">播放队列</h3>
          <button class="btn-icon btn-close-modal" id="btn-close-queue">✕</button>
        </div>
        <div class="modal-body">
          <div class="playlist" id="queue-list"></div>
        </div>
      </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu hidden" id="context-menu">
      <button class="ctx-item" data-action="play"><span data-i18n="ctxPlay">播放</span></button>
      <button class="ctx-item" data-action="play-next"><span data-i18n="ctxPlayNext">下一首播放</span></button>
      <button class="ctx-item" data-action="favorite"><span data-i18n="ctxFavorite">收藏</span></button>
      <div class="ctx-divider"></div>
      <button class="ctx-item" data-action="copy-name"><span data-i18n="ctxCopyName">复制文件名</span></button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════ -->
  <!--   iOS LAYOUT (iPhone / iPad)                -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="app-ios" class="platform-ios hidden">

    <!-- Song List View -->
    <div class="ios-view ios-list-view" id="ios-list-view">
      <header class="ios-header">
        <div class="ios-header-top">
          <h1 class="ios-app-title" data-i18n="appName">MyMusic</h1>
          <button class="btn-icon" id="btn-ios-search" title="搜索">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
        <div class="ios-search-bar hidden" id="ios-search-bar">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" class="ios-search-input" id="search-ios" data-i18n-placeholder="searchPlaceholder" placeholder="搜索歌曲、艺术家...">
          <button class="btn-icon btn-ios-search-cancel" id="btn-ios-search-cancel">取消</button>
        </div>
        <div class="ios-filter-tabs">
          <button class="ios-tab active" data-filter="all" data-i18n="tabAll">全部</button>
          <button class="ios-tab" data-filter="favorites" data-i18n="tabFavorites">收藏</button>
        </div>
      </header>

      <div class="ios-list-container" id="ios-list-container">
        <div class="ios-song-list" id="playlist-ios"></div>
        <div class="ios-list-loading" id="ios-list-loading">
          <div class="loading-spinner"></div>
          <p data-i18n="loadingSongs">正在加载歌曲...</p>
        </div>
        <div class="ios-list-empty hidden" id="ios-list-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          <p data-i18n="noSongs">暂无歌曲</p>
        </div>
      </div>
    </div>

    <!-- Mini Player -->
    <div class="ios-mini-player" id="ios-mini-player">
      <div class="ios-mini-progress" id="ios-mini-progress"></div>
      <button class="ios-mini-content" id="ios-mini-content">
        <img class="ios-mini-cover" id="ios-mini-cover" src="" alt="">
        <div class="ios-mini-info">
          <div class="ios-mini-title" id="ios-mini-title"></div>
          <div class="ios-mini-artist" id="ios-mini-artist"></div>
        </div>
        <div class="ios-mini-controls" @click.stop>
          <button class="btn-icon btn-ios-play" id="btn-play-mini">
            <svg class="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="icon-pause hidden" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
            </svg>
          </button>
          <button class="btn-icon" id="btn-next-mini" title="下一首">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
        </div>
        <div class="ios-mini-handle"></div>
      </button>
    </div>

    <!-- Full Screen Player -->
    <div class="ios-full-player hidden" id="ios-full-player">
      <div class="ios-full-bg" id="ios-full-bg"></div>
      <div class="ios-full-content">
        <!-- Handle -->
        <div class="ios-full-handle-area" id="ios-full-handle-area">
          <div class="ios-full-handle"></div>
        </div>

        <!-- Header -->
        <div class="ios-full-header">
          <button class="btn-icon" id="btn-ios-collapse">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div class="ios-full-header-info">
            <span class="ios-full-header-label" data-i18n="nowPlaying">正在播放</span>
            <span class="ios-full-header-source" id="ios-full-source"></span>
          </div>
          <button class="btn-icon" id="btn-ios-more">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
            </svg>
          </button>
        </div>

        <!-- Cover Art -->
        <div class="ios-full-cover-container">
          <img class="ios-full-cover" id="ios-full-cover" src="" alt="">
        </div>

        <!-- Song Info -->
        <div class="ios-full-info">
          <div class="ios-full-info-row">
            <div class="ios-full-text">
              <h2 class="ios-full-title" id="ios-full-title"></h2>
              <p class="ios-full-artist" id="ios-full-artist"></p>
            </div>
            <button class="btn-icon btn-ios-fav" id="btn-fav-ios" title="收藏">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </button>
          </div>

          <!-- Progress -->
          <div class="ios-full-progress-container">
            <div class="ios-full-progress-bar" id="ios-progress-bar">
              <div class="ios-full-progress-fill" id="ios-progress-fill"></div>
            </div>
            <div class="ios-full-time-row">
              <span class="ios-time-current" id="ios-time-current">0:00</span>
              <span class="ios-time-total" id="ios-time-total">0:00</span>
            </div>
          </div>

          <!-- Controls -->
          <div class="ios-full-controls">
            <button class="btn-ios-control" id="btn-prev-ios" title="上一首">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
              </svg>
            </button>
            <button class="btn-ios-control btn-ios-play-main" id="btn-play-ios" title="播放">
              <svg class="icon-play" width="44" height="44" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
              <svg class="icon-pause hidden" width="44" height="44" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
              </svg>
            </button>
            <button class="btn-ios-control" id="btn-next-ios" title="下一首">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- iOS Action Sheet -->
    <div class="ios-action-sheet hidden" id="ios-action-sheet">
      <div class="ios-action-sheet-backdrop" id="ios-action-backdrop"></div>
      <div class="ios-action-sheet-content">
        <div class="ios-action-sheet-title" id="ios-action-title"></div>
        <button class="ios-action-btn" data-action="play">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <span data-i18n="ctxPlay">播放</span>
        </button>
        <button class="ios-action-btn" data-action="play-next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
          </svg>
          <span data-i18n="ctxPlayNext">下一首播放</span>
        </button>
        <button class="ios-action-btn" data-action="favorite">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span data-i18n="ctxFavorite">收藏</span>
        </button>
        <button class="ios-action-btn ios-action-cancel" id="btn-ios-action-cancel" data-i18n="cancel">取消</button>
      </div>
    </div>
  </div>
